<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Identité ─────────────────────────────────────────────── -->
    <title>Portefolia — Créez votre portfolio professionnel en ligne</title>

    <meta name="author" content="Portefolia" />
    <meta name="keywords" content="portfolio en ligne, portfolio professionnel, portfolio sénégal, portfolio développeur, portfolio designer, portfolio étudiant, carte de visite digitale, carte NFC, portefolia, créer portfolio gratuit, portfolio créatif, carte NFC sénégal" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#2E7D32" />
    <link rel="canonical" href="https://portefolia.tech/" />

    <!-- ── Favicons ──────────────────────────────────────────────── -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- ── Open Graph (Facebook, WhatsApp, LinkedIn…) ───────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Portefolia" />
    <meta property="og:title" content="Portefolia — Expose ton futur" />

    <meta property="og:url" content="https://portefolia.tech/" />
    <meta property="og:image" content="https://portefolia.tech/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Portefolia — Créez votre portfolio professionnel en ligne" />
    <meta property="og:locale" content="fr_SN" />

    <!-- ── Twitter Card ──────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Portefolia — Expose ton futur" />

    <meta name="twitter:image" content="https://portefolia.tech/og-image.png" />
    <meta name="twitter:image:alt" content="Portefolia — portfolio professionnel en ligne" />

    <!-- ── Données structurées JSON-LD ──────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Portefolia",
      "url": "https://portefolia.tech",
      "logo": "https://portefolia.tech/logo_portefolia.png",
      "description": "Plateforme de création de portfolio en ligne professionnelle pour les talents africains. Carte de visite digitale et carte NFC.",
      "foundingLocation": {
        "@type": "Place",
        "name": "Dakar, Sénégal"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "contact@portefolia.tech",
        "contactType": "customer support",
        "availableLanguage": "French"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Portefolia",
      "url": "https://portefolia.tech",
      "description": "Créez votre portfolio professionnel en ligne au Sénégal",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://portefolia.tech/blog?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ── Polices ────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <body>
